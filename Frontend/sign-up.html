 <!-- SIgn UP Page -->

    <section class="sign-up">

      <img src="assests/logo/Excel Comp LOGO.svg" alt="Excel Comp logo" />
      <h1>Quick <span>Comparison</span> of Excel Files</h1>
      <p>With the use of user-friendly features, our Excel file comparison software enables Users to compare and highlight changes in spreadsheet files.</p>
      <img src="assests/sign-up.svg" alt="">

      <div class="sign-up__text-container">
         <h2 class="sign-up__title">Sign up</h2>
         <p class="sign-up__text">It's free and will always be free</p>
         
         <button class="continue-to-google">
            <!-- TODO: CHange to actual google oauth when the website is hosted and has a domain name -->
            <img src="assests/Icons/google.svg" alt="">
            <p>Continue to Google</p>
         </button>

         <p>Or</p>
 <!-- TODO: Add an "action" and "method" to ther form when the backend people do their thing -->
 <!-- SIgn UP Form -->
         <form action="" class="sign-up-form">

            <div class="sign-up-form__input">
               <label>
                 Email Address
               </label>
               <input type="email" pattern="[a-zA-Z0-9._+-?^%]+@[a-zA-Z0-9._+-]+\.[a-z]{2,}" name="email"
                 placeholder="Johndoe@gmail.com" required>
             </div>


             <div class="sign-up-form__input">
               <label>
                 Password
               </label>
               <input type="password" title="Must be at least 6 characters" pattern="[a-zA-Z0-9]{8,}" name="password"
                 placeholder="Minimum of 6 characters" required>
               <p class="password-hint">Must be at least 6 characters long</p>
             </div>

             <button type="submit" class="sign-up-form__button">Log In</button>
